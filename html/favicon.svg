<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Terminal background -->
  <rect width="32" height="32" rx="4" fill="#0C0C0C"/>
  <!-- Title bar -->
  <rect width="32" height="9" rx="4" fill="#1A1A1A"/>
  <rect y="5" width="32" height="4" fill="#1A1A1A"/>
  <!-- Prompt chevron -->
  <polyline points="5,14 11,19 5,24" stroke="#CCCCCC" stroke-width="2.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Cursor block -->
  <rect x="14" y="21" width="13" height="3" rx="1" fill="#CCCCCC"/>
</svg>
