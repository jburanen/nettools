# docker-compose.yml
# NetTools — browser-local network utilities served via nginx

# If changes are made on the web server, commit and push them to the repo:
# cd <docker projeect directory>
# git add -A
# git commit -m "describe what you changed"
# git push origin main

networks:
  default:
    name: proxy_net
    external: true

services:
  fwctl:
    build:
      context: .
      dockerfile: Dockerfile
    image: nettools:latest
    container_name: fwctl
    restart: unless-stopped
    ports:
      - "0.0.0.0:8080:80"
    volumes:
      - type: bind
        source: ./html
        target: /usr/share/nginx/html
        read_only: true
      - type: bind
        source: ./nginx/default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true