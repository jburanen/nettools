---
# docker-compose.yml
# NetTools — browser-local network utilities served via nginx
#
# Uses a LOCAL BIND MOUNT for static files so you can edit
# html/ on your host and changes are reflected immediately
# without rebuilding the image.  No Docker named volumes used.
#
# Usage:
#   docker compose up -d          # start (builds image if needed)
#   docker compose down           # stop and remove containers
#   docker compose build          # rebuild image after Dockerfile changes
#   docker compose logs -f        # tail logs

services:
  nettools:
    build:
      context: .
      dockerfile: Dockerfile

    image: nettools:latest

    container_name: nettools

    # ── Port mapping ─────────────────────────────────────────
    # Change the left side to use a different host port.
    ports:
      - "8080:80"

    # ── Local bind mount (no Docker named volume) ────────────
    # Maps ./html on the HOST into the container's web root.
    # Edit files locally and nginx serves them immediately.
    volumes:
      - type: bind
        source: ./subnet
        target: /usr/share/nginx/html
        read_only: true

    # ── Nginx config bind mount ──────────────────────────────
    # Mount config file directly so you can tune nginx without
    # rebuilding the image.
      - type: bind
        source: ./nginx/default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true

    # ── Resource limits ──────────────────────────────────────
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
        reservations:
          cpus: "0.05"
          memory: 16M

    # ── Restart policy ───────────────────────────────────────
    restart: unless-stopped

    # ── Health check ─────────────────────────────────────────
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

    # ── Logging ──────────────────────────────────────────────
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
